<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Users</title>
</head>
<body>
<h1>Users</h1>
<table border="1">
    <tr>
        <th>ID</th>
        <th>First name</th>
        <th>Last name</th>
        <th>Age</th>
    </tr>
    <tr th:each="user : ${users}">
        <td th:utext="${user.getId()}"></td>
        <td th:utext="${user.getFirstName()}"></td>
        <td th:utext="${user.getLastName()}"></td>
        <td th:utext="${user.getAge()}"></td>
        <td>
            <a th:href="@{/users/update(id=${user.id})}">
                <button>Update</button>
            </a>

            <a th:href="@{/users/delete(id=${user.id})}">
                <button>Delete</button>
            </a>
        </td>
    </tr>
</table>
<br/>
<hr/>
<a th:href="@{/users/create}">
    <button>Create new person</button>
</a>
</body>
</html>
